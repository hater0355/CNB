# Database shared with QUAN_LY_LUONG JavaFX.
db.url=jdbc:mysql://localhost:3306/quanlyluong?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
db.user=root
db.password=
db.pool.max=10
db.pool.min=2

# For LAN deployment, replace with a shared path such as:
# chat.files.root=\\\\SERVER\\CompanyChatFiles
chat.files.root=chat-files

chat.max.image.mb=10
chat.max.video.mb=100
chat.max.file.mb=50
chat.poll.seconds=3
chat.retention.days=90

# Realtime WebSocket server.
chat.realtime.host=0.0.0.0
chat.realtime.port=8787
chat.realtime.url=ws://localhost:8787

# Optional Redis bridge for multi-server realtime and online presence.
redis.enabled=false
redis.host=localhost
redis.port=6379
redis.password=
redis.database=0
redis.channel=chat_events
redis.presence.ttl.seconds=45

# Optional AES-256-GCM encryption for newly stored attachments.
# Keep disabled until chat.file.encryption.key is configured.
chat.file.encryption.enabled=false
chat.file.encryption.key=

# Desktop behavior.
ui.close.to.tray=true

# Automatic server-side backup.
backup.auto.enabled=true
backup.auto.time=02:00
backup.auto.dir=backups
backup.auto.keep.days=14

# Optional integrations. Leave blank if unused.
integration.slack.webhook=
integration.teams.webhook=

# Local demo secret. Change this before LAN deployment.
auth.token.secret=CHAT_NOI_BO_CHANGE_ME_LOCAL_SECRET
auth.session.hours=8
